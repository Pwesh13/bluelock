<div class="auth-page">
  <div class="auth-card">
    <h1>Inscription</h1>
    <p class="subtitle">Rejoins Blue Lock</p>

    @if (erreur) {
      <div class="erreur">{{ erreur }}</div>
    }

    <div class="form-row">
      <div class="form-group">
        <label>Prénom</label>
        <input type="text" [(ngModel)]="form.prenom" placeholder="Yoichi" />
      </div>
      <div class="form-group">
        <label>Nom</label>
        <input type="text" [(ngModel)]="form.nom" placeholder="Isagi" />
      </div>
    </div>

    <div class="form-group">
      <label>Nom d'utilisateur</label>
      <input type="text" [(ngModel)]="form.username" placeholder="isagi11" />
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" [(ngModel)]="form.email" placeholder="ton@email.com" />
    </div>

    <div class="form-group">
      <label>Mot de passe</label>
      <input type="password" [(ngModel)]="form.password" placeholder="••••••••" />
    </div>

    <button class="btn-submit" (click)="onSubmit()" [disabled]="chargement">
      {{ chargement ? 'Inscription...' : "S'inscrire" }}
    </button>

    <p class="switch">
      Déjà un compte ? <a routerLink="/login">Se connecter</a>
    </p>
  </div>
</div>
